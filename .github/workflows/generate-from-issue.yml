name: Generate Blog Post from Monthly Update

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  generate-post:
    # Only run when the label added is 'ready-to-publish' on a 'monthly-update' issue
    if: >
      github.event.label.name == 'ready-to-publish' &&
      contains(github.event.issue.labels.*.name, 'monthly-update')

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Write issue body to file
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          echo "$ISSUE_BODY" > /tmp/issue_body.txt
          echo "$ISSUE_TITLE" > /tmp/issue_title.txt
          echo "$ISSUE_NUMBER" > /tmp/issue_number.txt

      - name: Generate Jekyll post
        run: |
          python tools/generate_post.py \
            --issue-body /tmp/issue_body.txt \
            --issue-title /tmp/issue_title.txt \
            --issue-number /tmp/issue_number.txt \
            --output-dir _posts

      - name: Read generated filename
        id: post-info
        run: |
          FILENAME=$(cat /tmp/generated_filename.txt)
          echo "filename=$FILENAME" >> $GITHUB_OUTPUT

      - name: Create branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          FILENAME="${{ steps.post-info.outputs.filename }}"
          BRANCH="monthly-update/issue-${ISSUE_NUMBER}"
          DATE=$(date +%Y-%m-%d)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add "_posts/$FILENAME"
          git commit -m "draft: monthly update post from issue #${ISSUE_NUMBER}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Draft: Monthly Update Blog Post (Issue #${ISSUE_NUMBER})" \
            --body "Auto-generated draft from monthly update issue #${ISSUE_NUMBER}.

**Please review and edit the post before merging.**

- [ ] Review the generated content
- [ ] Edit the title, intro, and any sections as needed
- [ ] Add/adjust categories and tags
- [ ] Check that the date is correct
- [ ] Merge when satisfied

Closes #${ISSUE_NUMBER}" \
            --head "$BRANCH" \
            --base main \
            --label "blog-post-draft"
